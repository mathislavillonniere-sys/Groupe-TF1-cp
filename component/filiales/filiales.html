<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00152b" />
    <link rel="shortcut icon" href="./photo/logo_claire-removebg-preview.png" />
    <link
      rel="apple-touch-icon"
      href="./photo/logo_claire-removebg-preview.png"
    />
    <title>Nos Pôles - TF1 CP</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../navbar/menu.css" />
    <link rel="stylesheet" href="filiales.css" />
    <link rel="stylesheet" href="../footer/footer.css" />
  </head>

  <body>
    <script src="../navbar/navbar.js"></script>

    <header class="hero-banner">
      <h1>Nos Pôles d'Activités</h1>
      <p style="color: #7a9cc4">7 pôles stratégiques, un écosystème unique</p>
    </header>

    <section class="stats-band">
      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-val">7</span>
          <span class="stat-lab">Pôles actifs</span>
        </div>
        <div class="stat-box">
          <span class="stat-val">206 Mds€</span>
          <span class="stat-lab">CA Global</span>
        </div>
        <div class="stat-box">
          <span class="stat-val">250 000</span>
          <span class="stat-lab">Collaborateurs</span>
        </div>
        <div class="stat-box">
          <span class="stat-val">75+ pays</span>
          <span class="stat-lab">Présence mondiale</span>
        </div>
      </div>
    </section>

    <main class="page-content">
      <div class="filter-bar">
        <button class="filter-pill active" data-filter="all">
          Tous les pôles
        </button>
        <button class="filter-pill" data-filter="media">Média</button>
        <button class="filter-pill" data-filter="tech">Télécom</button>
        <button class="filter-pill" data-filter="finance">Finance</button>
        <button class="filter-pill" data-filter="infrastructure">
          Infrastructure et Logistique
        </button>
        <button class="filter-pill" data-filter="commerce">Commerce</button>
      </div>

      <div class="timeline-container">
        <div class="tl-line"></div>
        <div id="grille-filiales"></div>
      </div>
    </main>

    <script src="../footer/footer.js"></script>
    <script src="filiales.js"></script>
  </body>
</html>
