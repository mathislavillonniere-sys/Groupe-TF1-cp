<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00152b" />
    <link rel="shortcut icon" href="./photo/logo_claire-removebg-preview.png" />
    <link
      rel="apple-touch-icon"
      href="./photo/logo_claire-removebg-preview.png"
    />
    <title>Mises à jour des Séries - TF1 CP</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../navbar/menu.css" />
    <link rel="stylesheet" href="renouvellement.css" />
    <link rel="stylesheet" href="../footer/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <script src="../navbar/navbar.js"></script>

    <header class="hero-banner">
      <h1>Rennouvellement des Programmes</h1>
      <p>Statut des séries et nouveautés pour la saison 2026 - 2027.</p>
    </header>
    <div class="filter-bar">
      <input
        type="text"
        id="search-input"
        placeholder="🔍 Rechercher une série..."
      />
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Tout</button>
        <button class="filter-btn filter-renouvele" data-filter="renouvele">
          ✅ Renouvelées
        </button>
        <button class="filter-btn filter-annule" data-filter="annule">
          ❌ Annulées
        </button>
        <button class="filter-btn filter-nouveau" data-filter="nouveau">
          ⭐ Nouveautés
        </button>
      </div>
    </div>

    <main class="section-container">
      <section class="program-section">
        <h2>
          <i class="fa-solid fa-circle-check" style="color: #10b981"></i> Séries
          Renouvelées
        </h2>
        <div id="grid-renouveles" class="program-grid"></div>
      </section>

      <section class="program-section">
        <h2>
          <i
            class="fa-solid fa-circle-xmark"
            style="color: var(--rouge-tf1)"
          ></i>
          Séries Annulées / Terminées
        </h2>
        <div id="grid-annules" class="program-grid"></div>
      </section>

      <section class="program-section">
        <h2>
          <i class="fa-solid fa-star" style="color: #3b82f6"></i> Nouvelles
          Séries Commandées
        </h2>
        <div id="grid-nouveaux" class="program-grid"></div>
      </section>
    </main>

    <script type="module" src="renouvellement.js"></script>
    <script src="../footer/footer.js"></script>
  </body>
</html>
