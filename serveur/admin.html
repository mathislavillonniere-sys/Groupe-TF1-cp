<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration - TF1 Camping Paradis</title>
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-wrapper" id="page-wrapper">
      <div class="login-container" id="login-container">
        <div class="login-card">
          <div class="logo-area">
            <img
              src="../photo/logo_claire-removebg-preview.png"
              alt="Logo TF1 CP"
            />
            <h1>Accès Administrateur</h1>
            <p>Portail de gestion des contenus</p>
          </div>

          <form id="login-form">
            <div class="input-group">
              <label for="email">Identifiant professionnel</label>
              <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input
                  type="email"
                  id="email"
                  placeholder="admin@tf1-campingparadis.fr"
                  required
                />
              </div>
            </div>

            <div class="input-group">
              <label for="password">Mot de passe</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn-login">
              Se connecter <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <div class="login-footer">
            <a href="../index.html"
              ><i class="fas fa-home"></i> Retour au site public</a
            >
          </div>
        </div>
      </div>

      <div id="dashboard-view" class="dashboard-container hidden">
        <nav class="admin-navbar">
          <div class="admin-logo">
            <img src="../photo/logo_sombre-removebg-preview.png" alt="Logo" />
            <span>Espace Admin</span>
          </div>
          <button id="btn-logout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Déconnexion
          </button>
        </nav>

        <main class="admin-content">
          <h2>Bienvenue dans ton espace, Mathis ! 👋</h2>
          <p>
            C'est ici que nous allons bientôt mettre l'outil pour gérer tes
            séries.
          </p>

          <div class="placeholder-box">
            <i class="fas fa-tools"></i> En construction...
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="admin.js"></script>
  </body>
</html>
