<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration - TF1 Camping Paradis</title>
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo-area">
          <img
            src="../photo/logo_claire-removebg-preview.png"
            alt="Logo TF1 CP"
          />
          <h1>Accès Administrateur</h1>
          <p>Portail de gestion des contenus</p>
        </div>

        <form id="login-form">
          <div class="input-group">
            <label for="email">Identifiant professionnel</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                placeholder="admin@tf1-campingparadis.fr"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <label for="password">Mot de passe</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-login">
            Se connecter <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <div class="login-footer">
          <a href="../index.html"
            ><i class="fas fa-home"></i> Retour au site public</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
